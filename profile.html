<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONA</title>
    <style>
        :root {
            --bg: #fcfaf2;
            --text: #1a1a1a;
            --dim: #a0a090;
            --accent: #ff3c00;
            --border: #e0ddd5;
            --panel: #f7f5ed;
            --mono: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body, html {
            height: 100vh; width: 100vw;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            overflow: hidden;
            display: grid;
            grid-template-rows: 60px 1fr 120px;
        }

        header {
            padding: 0 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .brand { font-weight: 900; font-size: 18px; text-decoration: none; color: var(--text); }
        .label { color: var(--dim); text-transform: uppercase; font-size: 10px; margin-bottom: 15px; display: block; }

        main {
            display: grid;
            grid-template-columns: 1fr 400px;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        /* Left */
        .primary-zone {
            padding: 40px;
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; justify-content: space-between;
            overflow-y: auto;
        }

        h1 { font-size: clamp(48px, 8vw, 110px); line-height: 0.8; letter-spacing: -0.07em; text-transform: uppercase; }

        .avatar-row {
            display: flex; align-items: center; gap: 20px; margin-top: 32px;
        }
        .avatar-box {
            width: 80px; height: 80px; border: 1px solid var(--text);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; text-transform: uppercase; font-weight: 900;
            flex-shrink: 0; background: var(--panel); position: relative;
            overflow: hidden;
        }
        .avatar-box img {
            width: 100%; height: 100%; object-fit: cover; display: none;
        }
        .avatar-initials { color: var(--text); }

        .avatar-upload {
            display: flex; flex-direction: column; gap: 8px;
        }
        .upload-btn {
            background: transparent; border: 1px solid var(--text);
            color: var(--text); font-family: var(--mono); font-size: 10px;
            padding: 6px 14px; text-transform: uppercase; letter-spacing: 0.08em;
            cursor: crosshair;
        }
        .upload-btn:hover { background: var(--text); color: var(--bg); }
        #avatar-file { display: none; }

        /* stat rows */
        .stat-grid { display: flex; flex-direction: column; }
        .stat-row {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border); padding: 8px 0;
        }

        /* Right: form */
        .control-zone { padding: 40px; background: var(--panel); overflow-y: auto; }
        .control-block { margin-bottom: 32px; }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .field label { color: var(--dim); text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; }
        .field input {
            background: transparent; border: none; border-bottom: 1px solid var(--text);
            outline: none; font-family: var(--mono); font-size: 12px; color: var(--text);
            padding: 8px 0; width: 100%;
        }
        .field input:focus { border-bottom-color: var(--accent); }
        .field input:disabled { color: var(--dim); border-bottom-color: var(--border); cursor: not-allowed; }

        .save-btn {
            width: 100%; padding: 11px;
            background: var(--text); color: var(--bg);
            border: none; font-family: var(--mono); font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.1em; cursor: crosshair;
        }
        .save-btn:hover { background: var(--accent); }
        .save-btn:disabled { background: var(--dim); cursor: not-allowed; }

        .danger-btn {
            width: 100%; padding: 11px; margin-top: 10px;
            background: transparent; color: var(--accent);
            border: 1px solid var(--accent); font-family: var(--mono); font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.1em; cursor: crosshair;
        }
        .danger-btn:hover { background: var(--accent); color: var(--bg); }

        /* Footer */
        footer {
            display: grid;
            grid-template-columns: 1fr 400px;
        }
        .terminal-zone {
            padding: 20px 40px;
            display: flex; align-items: center; gap: 10px;
        }
        .meta-zone {
            padding: 20px 40px; border-left: 1px solid var(--border);
            display: flex; flex-direction: column; justify-content: center;
        }

        /* Toast */
        #toast {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: var(--bg);
            font-family: var(--mono); font-size: 10px; text-transform: uppercase;
            letter-spacing: 0.1em; padding: 10px 24px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #toast.show { opacity: 1; }
        #toast.error { background: var(--accent); }

        @media (max-width: 1000px) {
            main { grid-template-columns: 1fr; overflow-y: auto; }
            .control-zone { border-top: 1px solid var(--border); }
            footer { grid-template-columns: 1fr; }
            .meta-zone { display: none; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="brand">SONA</a>
    <div style="display:flex;align-items:center;gap:30px;">
        <div>PROFILE_MODULE // <span id="clock"></span></div>
        <a href="music.html" style="color:var(--text);text-decoration:none;border:1px solid var(--text);padding:4px 12px;text-transform:uppercase;font-size:10px;letter-spacing:0.1em;" onmouseover="this.style.background='var(--text)';this.style.color='var(--bg)'" onmouseout="this.style.background='transparent';this.style.color='var(--text)'">STREAM</a>
    </div>
</header>

<main>
    <!-- Left: identity -->
    <div class="primary-zone">
        <div>
            <span class="label">Node_Identity</span>
            <h1 id="display-name">USER<br>NODE.</h1>

            <div class="avatar-row">
                <div class="avatar-box" id="avatar-box">
                    <img id="avatar-img" src="" alt="">
                    <span class="avatar-initials" id="avatar-initials">?</span>
                </div>
                <div class="avatar-upload">
                    <span class="label" style="margin:0;">Profile_Image</span>
                    <button class="upload-btn" onclick="document.getElementById('avatar-file').click()">UPLOAD_IMG</button>
                    <input type="file" id="avatar-file" accept="image/*" onchange="previewAvatar(event)">
                    <span style="color:var(--dim);font-size:10px;" id="avatar-status">NO_IMAGE_SET</span>
                </div>
            </div>
        </div>

        <div>
            <span class="label">Account_Data</span>
            <div class="stat-grid">
                <div class="stat-row"><span class="label" style="margin:0;">Node_ID</span><span id="stat-id">--</span></div>
                <div class="stat-row"><span class="label" style="margin:0;">Registered</span><span id="stat-created">--</span></div>
                <div class="stat-row"><span class="label" style="margin:0;">Last_Login</span><span id="stat-login">--</span></div>
                <div class="stat-row"><span class="label" style="margin:0;">Provider</span><span id="stat-provider">--</span></div>
            </div>
        </div>
    </div>

    <!-- Right: edit form -->
    <aside class="control-zone">
        <div class="control-block">
            <span class="label">Edit_Profile</span>

            <div class="field">
                <label for="f-username">Node_Handle (Username)</label>
                <input type="text" id="f-username" placeholder="HANDLE_ID">
            </div>
            <div class="field">
                <label for="f-email">Identifier (Email)</label>
                <input type="email" id="f-email" placeholder="user@domain.io" disabled>
            </div>
            <button class="save-btn" id="save-profile-btn" onclick="saveProfile()">SAVE_CHANGES &gt;</button>
        </div>

        <div class="control-block">
            <span class="label">Change_Auth_Key</span>
            <div class="field">
                <label for="f-newpass">New_Auth_Key</label>
                <input type="password" id="f-newpass" placeholder="••••••••••••" minlength="8">
            </div>
            <div class="field">
                <label for="f-confirmpass">Confirm_Auth_Key</label>
                <input type="password" id="f-confirmpass" placeholder="••••••••••••" minlength="8">
            </div>
            <button class="save-btn" onclick="changePassword()">UPDATE_KEY &gt;</button>
        </div>

        <div class="control-block">
            <span class="label">Session_Control</span>
            <button class="danger-btn" onclick="signOut()">LOGOUT_NODE</button>
        </div>
    </aside>
</main>

<footer>
    <div class="terminal-zone">
        <span>></span>
        <span style="color:var(--dim);" id="footer-status">PROFILE_MODULE // READY</span>
    </div>
    <div class="meta-zone">
        <div style="display:flex;justify-content:space-between;">
            <span class="label" style="margin:0;">Signal</span>
            <span id="signal-val">99.2%</span>
        </div>
        <div style="height:2px;background:var(--border);width:100%;margin-top:6px;">
            <div id="signal-bar" style="height:100%;background:var(--text);width:99%;"></div>
        </div>
    </div>
</footer>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const sb = supabase.createClient(
        'https://scjigaqfgoeuaruzzajk.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjamlnYXFmZ29ldWFydXp6YWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDM5NTQsImV4cCI6MjA4OTkxOTk1NH0.JtclwpnZmWtdu4AqS0qnWRiac7T7rC6wj22udDVKxQw'
    );

    let currentUser = null;

    // Clock
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();

    // Signal
    setInterval(() => {
        const v = (Math.random() * 5 + 95).toFixed(1);
        document.getElementById('signal-bar').style.width = v + '%';
        document.getElementById('signal-val').innerText = v + '%';
    }, 500);

    // Load session — use getUser() for fresh server-side data (not stale cache)
    sb.auth.getUser().then(({ data, error }) => {
        if (error || !data.user) { window.location.href = 'auth.html'; return; }
        currentUser = data.user;
        populateProfile(currentUser);
    });

    function populateProfile(user) {
        const name = user.user_metadata?.username || user.email.split('@')[0];
        const initials = name.substring(0, 2).toUpperCase();

        document.getElementById('display-name').innerHTML = name.toUpperCase().replace(/(.{4})/g, '$1<br>').replace(/<br>$/, '') + '<br>NODE.';
        document.getElementById('avatar-initials').innerText = initials;
        document.getElementById('f-username').value = name;
        document.getElementById('f-email').value = user.email;

        // avatar
        if (user.user_metadata?.avatar_url) {
            const img = document.getElementById('avatar-img');
            // cache-bust so browser always fetches the latest image
            img.src = user.user_metadata.avatar_url + '?t=' + Date.now();
            img.style.display = 'block';
            document.getElementById('avatar-initials').style.display = 'none';
            document.getElementById('avatar-status').innerText = 'IMAGE_SET';
        } else {
            document.getElementById('avatar-img').style.display = 'none';
            document.getElementById('avatar-initials').style.display = '';
            document.getElementById('avatar-status').innerText = 'NO_IMAGE_SET';
        }

        // stats
        document.getElementById('stat-id').innerText = user.id.substring(0, 8).toUpperCase() + '...';
        document.getElementById('stat-created').innerText = new Date(user.created_at).toLocaleDateString().toUpperCase();
        document.getElementById('stat-login').innerText = new Date(user.last_sign_in_at).toLocaleDateString().toUpperCase();
        document.getElementById('stat-provider').innerText = (user.app_metadata?.provider || 'EMAIL').toUpperCase();
    }

    // Resize + compress image to max 400x400 JPEG before upload
    function compressImage(file, maxSize = 400, quality = 0.82) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
                    const w = Math.round(img.width * scale);
                    const h = Math.round(img.height * scale);
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function previewAvatar(e) {
        const file = e.target.files[0];
        if (!file) return;

        // show preview instantly from original file
        const previewUrl = URL.createObjectURL(file);
        const img = document.getElementById('avatar-img');
        img.src = previewUrl;
        img.style.display = 'block';
        document.getElementById('avatar-initials').style.display = 'none';

        // compress before upload
        document.getElementById('avatar-status').innerText = 'COMPRESSING...';
        setFooter('COMPRESSING_IMAGE...');
        const compressed = await compressImage(file);

        // upload to supabase storage
        document.getElementById('avatar-status').innerText = 'UPLOADING...';
        setFooter('UPLOADING_IMAGE...');

        const path = `${currentUser.id}/avatar.jpg`;

        const { error: upErr } = await sb.storage
            .from('avatars')
            .upload(path, compressed, { upsert: true, contentType: 'image/jpeg' });

        if (upErr) {
            document.getElementById('avatar-status').innerText = 'UPLOAD_FAILED';
            showToast('UPLOAD_ERROR: ' + upErr.message.toUpperCase(), true);
            setFooter('UPLOAD_FAILED');
            return;
        }

        const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
        const avatarUrl = urlData.publicUrl;

        // save url to user metadata
        const { data, error } = await sb.auth.updateUser({ data: { avatar_url: avatarUrl } });
        if (error) {
            document.getElementById('avatar-status').innerText = 'SAVE_FAILED';
            showToast('METADATA_ERROR: ' + error.message.toUpperCase(), true);
        } else {
            // re-fetch from server to get the truly persisted metadata
            const { data: fresh } = await sb.auth.getUser();
            currentUser = fresh.user;
            // update the displayed image with the real stored URL (cache-busted)
            const img = document.getElementById('avatar-img');
            img.src = avatarUrl + '?t=' + Date.now();
            img.style.display = 'block';
            document.getElementById('avatar-initials').style.display = 'none';
            document.getElementById('avatar-status').innerText = 'IMAGE_SAVED';
            showToast('AVATAR_UPLOADED');
            setFooter('IMAGE_SAVED // OK');
        }
    }

    async function saveProfile() {
        const btn = document.getElementById('save-profile-btn');
        const username = document.getElementById('f-username').value.trim();
        if (!username) { showToast('USERNAME_REQUIRED', true); return; }

        btn.disabled = true;
        setFooter('SAVING_CHANGES...');

        const { data, error } = await sb.auth.updateUser({ data: { username } });
        btn.disabled = false;

        if (error) {
            showToast('ERROR: ' + error.message.toUpperCase(), true);
            setFooter('SAVE_FAILED');
        } else {
            currentUser = data.user;
            populateProfile(currentUser);
            showToast('PROFILE_UPDATED');
            setFooter('CHANGES_SAVED // OK');
        }
    }

    async function changePassword() {
        const np = document.getElementById('f-newpass').value;
        const cp = document.getElementById('f-confirmpass').value;
        if (!np) { showToast('ENTER_NEW_PASSWORD', true); return; }
        if (np !== cp) { showToast('PASSWORDS_DO_NOT_MATCH', true); return; }
        if (np.length < 8) { showToast('MIN_8_CHARACTERS', true); return; }

        setFooter('UPDATING_AUTH_KEY...');
        const { error } = await sb.auth.updateUser({ password: np });
        if (error) {
            showToast('ERROR: ' + error.message.toUpperCase(), true);
            setFooter('UPDATE_FAILED');
        } else {
            document.getElementById('f-newpass').value = '';
            document.getElementById('f-confirmpass').value = '';
            showToast('AUTH_KEY_UPDATED');
            setFooter('KEY_UPDATED // OK');
        }
    }

    async function signOut() {
        await sb.auth.signOut();
        window.location.href = 'auth.html';
    }

    function setFooter(msg) {
        document.getElementById('footer-status').innerText = msg;
    }

    function showToast(msg, isError) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = 'show' + (isError ? ' error' : '');
        setTimeout(() => { t.className = ''; }, 2800);
    }
</script>
</body>
</html>
